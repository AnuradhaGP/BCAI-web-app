version: '3.8'

services:
  backend:
    build: ./backend
    container_name: ai_anomaly_backend
    ports:
      - "5000:5000"
    # Network configuration to allow sniffing the host network / Jenkins network
    network_mode: "host" 
    # Use privileged mode so scapy can capture packets
    privileged: true
    environment:
      - FLASK_ENV=development

  frontend:
    build: ./frontend
    container_name: ai_anomaly_frontend
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
